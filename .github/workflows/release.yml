name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v1.0.0) — required for a proper release'
        required: true
        default: 'v0.0.0-test'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os-name }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:

          # ── Windows x64 ────────────────────────────────────────────────
          - runs-on: windows-latest
            os-name: Windows x64
            qt-arch: win64_msvc2019_64
            artifact-suffix: windows-x64.zip

          # ── Windows ARM64 (cross-compiled on x64) ──────────────────────
          - runs-on: windows-latest
            os-name: Windows ARM64
            qt-arch: win64_msvc2019_arm64
            cmake-arch: ARM64
            artifact-suffix: windows-arm64.zip

          # ── Linux x86_64 ────────────────────────────────────────────────
          - runs-on: ubuntu-22.04
            os-name: Linux
            artifact-suffix: linux-x86_64.AppImage

          # ── macOS Apple Silicon ─────────────────────────────────────────
          - runs-on: macos-latest
            os-name: macOS ARM64
            artifact-suffix: macos-arm64.dmg


    steps:
      - uses: actions/checkout@v4

      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          arch: ${{ matrix.qt-arch }}
          cache: true
          aqtversion: '==3.2.1'
          extra: '--base https://download.qt.io'

      - name: Install Qt (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install qt
          QT_PREFIX=$(brew --prefix qt)
          echo "${QT_PREFIX}/bin" >> $GITHUB_PATH
          echo "Qt6_DIR=${QT_PREFIX}/lib/cmake/Qt6" >> $GITHUB_ENV

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            qt6-base-dev qt6-tools-dev qt6-tools-dev-tools \
            libgl1-mesa-dev libxkbcommon-dev libxcb-cursor-dev libxcb-xinerama0-dev \
            imagemagick

      - name: Configure
        run: >
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          ${{ matrix.cmake-arch && format('-G "Visual Studio 17 2022" -A {0}', matrix.cmake-arch) || '' }}

      - name: Build
        run: cmake --build build --config Release

      # ── Windows ──────────────────────────────────────────────────────────
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') { '${{ inputs.tag_name }}' } else { '${{ github.ref_name }}' }
          $artifact = "QtDbcEditor-$tag-${{ matrix.artifact-suffix }}"
          $hostQtBin = Join-Path (Split-Path $env:QT_ROOT_DIR -Parent) "msvc2019_64\bin"
          & "$hostQtBin\windeployqt.exe" build/Release/QtDbcEditor.exe
          Compress-Archive -Path build/Release/* -DestinationPath $artifact
          echo "ARTIFACT=$artifact" >> $env:GITHUB_ENV

      # ── Linux ─────────────────────────────────────────────────────────────
      - name: Package (Linux)
        if: runner.os == 'Linux'
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
        run: |
          tag=${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          artifact="QtDbcEditor-${tag}-${{ matrix.artifact-suffix }}"
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp build/QtDbcEditor AppDir/usr/bin/

          printf '[Desktop Entry]\nName=QtDbcEditor\nExec=QtDbcEditor\nIcon=QtDbcEditor\nType=Application\nCategories=Utility;\n' \
            > AppDir/usr/share/applications/QtDbcEditor.desktop

          convert -size 256x256 xc:#2d5a8e \
            AppDir/usr/share/icons/hicolor/256x256/apps/QtDbcEditor.png

          QMAKE=$(which qmake6 2>/dev/null || which qmake) ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir --plugin qt --output appimage

          mv QtDbcEditor*.AppImage "$artifact"
          echo "ARTIFACT=$artifact" >> $GITHUB_ENV

      # ── macOS ─────────────────────────────────────────────────────────────
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          tag=${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          artifact="QtDbcEditor-${tag}-${{ matrix.artifact-suffix }}"
          macdeployqt build/QtDbcEditor.app -dmg
          mv build/QtDbcEditor.dmg "$artifact"
          echo "ARTIFACT=$artifact" >> $GITHUB_ENV

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' }}
          generate_release_notes: true
          files: ${{ env.ARTIFACT }}

  # ── Linux ARM64 (QEMU emulation via Docker) ──────────────────────────────
  # Runs an arm64 Ubuntu container on the x86_64 runner via QEMU binfmt.
  # Qt is installed from Ubuntu apt (6.2.x) — sufficient for this app.
  # Expect ~20-40 min build time due to emulation overhead.
  build-linux-arm64:
    name: Linux ARM64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Write ARM64 build script
        run: |
          cat > /tmp/build-arm64.sh << 'SCRIPT'
          #!/bin/bash
          set -e

          apt-get update -y
          apt-get install -y cmake ninja-build g++ \
            libgl1-mesa-dev libxkbcommon-dev libxcb-cursor-dev \
            qt6-base-dev patchelf

          cd /src
          cmake -B build -DCMAKE_BUILD_TYPE=Release -G Ninja
          cmake --build build

          # Bundle binary + Qt shared libs into a relocatable directory
          mkdir -p bundle/lib
          cp build/QtDbcEditor bundle/

          # Copy all libQt6* and their transitive Qt deps
          ldd build/QtDbcEditor \
            | awk '/libQt6/ {print $3}' \
            | xargs -I{} cp {} bundle/lib/

          # Also copy platform plugin needed at runtime
          QT_PLUGIN_DIR=$(qmake6 -query QT_INSTALL_PLUGINS 2>/dev/null || qmake -query QT_INSTALL_PLUGINS)
          mkdir -p bundle/platforms
          cp "${QT_PLUGIN_DIR}/platforms/libqxcb.so" bundle/platforms/ 2>/dev/null || true
          cp "${QT_PLUGIN_DIR}/platforms/libqoffscreen.so" bundle/platforms/ 2>/dev/null || true

          # Patch RPATH so the binary finds bundled libs
          patchelf --set-rpath '$ORIGIN/lib' bundle/QtDbcEditor

          # Launcher script
          cat > bundle/run.sh << 'EOF'
          #!/bin/bash
          DIR="$(dirname "$(readlink -f "$0")")"
          export QT_QPA_PLATFORM_PLUGIN_PATH="$DIR/platforms"
          exec "$DIR/QtDbcEditor" "$@"
          EOF
          chmod +x bundle/run.sh

          tar -czf /src/QtDbcEditor-linux-aarch64.tar.gz -C /src bundle/
          SCRIPT
          chmod +x /tmp/build-arm64.sh

      - name: Build and package in ARM64 container
        run: |
          docker run --rm --platform linux/arm64 \
            -v "$PWD:/src" \
            -v "/tmp/build-arm64.sh:/build-arm64.sh" \
            ubuntu:22.04 bash /build-arm64.sh

          tag=${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          artifact="QtDbcEditor-${tag}-linux-aarch64.tar.gz"
          mv "$PWD/QtDbcEditor-linux-aarch64.tar.gz" "$artifact"
          echo "ARTIFACT=$artifact" >> $GITHUB_ENV

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' }}
          generate_release_notes: false
          files: ${{ env.ARTIFACT }}
