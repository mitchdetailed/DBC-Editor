name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os-name }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: windows-latest
            os-name: Windows
            qt-arch: win64_msvc2019_64
            artifact: QtDbcTool-windows-x64.zip

          - runs-on: ubuntu-22.04
            os-name: Linux
            qt-arch: gcc_64
            artifact: QtDbcTool-linux-x64.AppImage

          - runs-on: macos-latest
            os-name: macOS
            qt-arch: clang_arm64
            artifact: QtDbcTool-macos.dmg

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          arch: ${{ matrix.qt-arch }}
          cache: true

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev libxcb-cursor-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      # ── Windows ──────────────────────────────────────────────────────────
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          windeployqt build/Release/QtDbcTool.exe
          Compress-Archive -Path build/Release/* -DestinationPath QtDbcTool-windows-x64.zip

      # ── Linux ─────────────────────────────────────────────────────────────
      - name: Package (Linux)
        if: runner.os == 'Linux'
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp build/QtDbcTool AppDir/usr/bin/

          printf '[Desktop Entry]\nName=QtDbcTool\nExec=QtDbcTool\nIcon=QtDbcTool\nType=Application\nCategories=Utility;\n' \
            > AppDir/usr/share/applications/QtDbcTool.desktop

          convert -size 256x256 xc:#2d5a8e \
            AppDir/usr/share/icons/hicolor/256x256/apps/QtDbcTool.png

          QMAKE=$(which qmake) ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir --plugin qt --output appimage

          mv QtDbcTool*.AppImage QtDbcTool-linux-x64.AppImage

      # ── macOS ─────────────────────────────────────────────────────────────
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          macdeployqt build/QtDbcTool.app -dmg
          mv build/QtDbcTool.dmg QtDbcTool-macos.dmg

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ matrix.artifact }}
