name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v1.0.0) — required for a proper release'
        required: true
        default: 'v0.0.0-test'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os-name }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:

          # ── Windows x64 ────────────────────────────────────────────────
          - runs-on: windows-latest
            os-name: Windows x64
            qt-arch: win64_msvc2022_64
            artifact-suffix: windows-x64.zip

          # ── Windows ARM64 (cross-compiled on x64) ──────────────────────
          - runs-on: windows-latest
            os-name: Windows ARM64
            qt-arch: win64_msvc2022_arm64
            cmake-arch: ARM64
            artifact-suffix: windows-arm64.zip

          # ── Linux x86_64 ────────────────────────────────────────────────
          - runs-on: ubuntu-22.04
            os-name: Linux
            qt-arch: gcc_64
            artifact-suffix: linux-x86_64.AppImage

          # ── macOS Apple Silicon ─────────────────────────────────────────
          - runs-on: macos-latest
            os-name: macOS ARM64
            qt-arch: clang_arm64
            artifact-suffix: macos-arm64.dmg

          # ── macOS Intel ─────────────────────────────────────────────────
          - runs-on: macos-13
            os-name: macOS x64
            qt-arch: clang_64
            artifact-suffix: macos-x64.dmg

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          arch: ${{ matrix.qt-arch }}
          cache: true

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev libxcb-cursor-dev imagemagick

      - name: Configure
        run: >
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          ${{ matrix.cmake-arch && format('-G "Visual Studio 17 2022" -A {0}', matrix.cmake-arch) || '' }}

      - name: Build
        run: cmake --build build --config Release

      # ── Windows ──────────────────────────────────────────────────────────
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') { '${{ inputs.tag_name }}' } else { '${{ github.ref_name }}' }
          $artifact = "QtDbcEditor-$tag-${{ matrix.artifact-suffix }}"
          windeployqt build/Release/QtDbcEditor.exe
          Compress-Archive -Path build/Release/* -DestinationPath $artifact
          echo "ARTIFACT=$artifact" >> $env:GITHUB_ENV

      # ── Linux ─────────────────────────────────────────────────────────────
      - name: Package (Linux)
        if: runner.os == 'Linux'
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
        run: |
          tag=${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          artifact="QtDbcEditor-${tag}-${{ matrix.artifact-suffix }}"
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp build/QtDbcEditor AppDir/usr/bin/

          printf '[Desktop Entry]\nName=QtDbcEditor\nExec=QtDbcEditor\nIcon=QtDbcEditor\nType=Application\nCategories=Utility;\n' \
            > AppDir/usr/share/applications/QtDbcEditor.desktop

          convert -size 256x256 xc:#2d5a8e \
            AppDir/usr/share/icons/hicolor/256x256/apps/QtDbcEditor.png

          QMAKE=$(which qmake6 2>/dev/null || which qmake) ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir --plugin qt --output appimage

          mv QtDbcEditor*.AppImage "$artifact"
          echo "ARTIFACT=$artifact" >> $GITHUB_ENV

      # ── macOS ─────────────────────────────────────────────────────────────
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          tag=${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          artifact="QtDbcEditor-${tag}-${{ matrix.artifact-suffix }}"
          macdeployqt build/QtDbcEditor.app -dmg
          mv build/QtDbcEditor.dmg "$artifact"
          echo "ARTIFACT=$artifact" >> $GITHUB_ENV

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' }}
          generate_release_notes: true
          files: ${{ env.ARTIFACT }}
